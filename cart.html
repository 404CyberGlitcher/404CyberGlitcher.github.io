<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Shopping Cart | Anas Plastic Enterprises</title>
  <meta name="description" content="Review your selected cosmetic packaging items and place your order via WhatsApp at Anas Plastic Enterprises Lahore.">
  <meta name="robots" content="index, follow">
  
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/galaxy-button.css">
  <link rel="stylesheet" href="css/ux-motion.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1 data-aos="fade-up">Shopping Cart</h1>
      <p data-aos="fade-up" data-aos-delay="100">Review your selected items before placing your order</p>
    </div>
  </section>

  <main class="page-transition">
    <section class="cart-section section">
      <div class="container">
        <div class="cart-container" id="cart-container">
          <!-- Cart content injected by JS -->
          <div class="loader">
            <div class="loader-spinner"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/galaxy-button.js"></script>
  <script src="js/aos-init.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
