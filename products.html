<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>Products | Anas Plastic - Cosmetic Packaging Solutions</title>
  <meta name="description" content="Browse our extensive collection of empty plastic packaging for cosmetics. Cream jars, crystal bottles, facial containers & more at Anas Plastic Enterprises Lahore.">
  <meta name="keywords" content="Anas Plastic Products, Cosmetic Packaging, Plastic Jars, Plastic Bottles, Empty Containers, Lahore">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://anasplastic.com/products.html">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Products | Anas Plastic Enterprises">
  <meta property="og:description" content="Browse our cosmetic packaging collection">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/galaxy-button.css">
  <link rel="stylesheet" href="css/ux-motion.css">
  <link rel="stylesheet" href="css/products.css">
</head>
<body>
  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1 data-aos="fade-up">Our Products</h1>
      <p data-aos="fade-up" data-aos-delay="100">Discover the perfect packaging for your beauty brand</p>
    </div>
  </section>

  <main class="page-transition">
    <!-- Filters Section -->
    <section class="filters-section">
      <div class="container">
        <div class="filters-bar">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search products..." aria-label="Search products">
          </div>
          
          <div class="category-filter">
            <select id="category-select" aria-label="Filter by category">
              <option value="all">All Categories</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Products Grid -->
    <section class="products-section section">
      <div class="container">
        <div class="products-grid" id="products-grid">
          <!-- Products injected by JS -->
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <!-- Pagination injected by JS -->
        </div>
        
        <!-- No Results -->
        <div class="no-results hidden" id="no-results">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <h3>No products found</h3>
          <p>Try adjusting your search or filter criteria</p>
        </div>
      </div>
    </section>
  </main>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/products-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/galaxy-button.js"></script>
  <script src="js/aos-init.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
