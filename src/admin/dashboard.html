<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - ColorMart Admin</title>
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/admin/dashboard.css" />
  </head>
  <body>
    <div class="admin-wrapper">
      <!-- Sidebar -->
      <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
          <h2>ColorMart <span>Admin</span></h2>
          <p>Management Portal</p>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-item active" data-page="dashboard">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
          </div>
          <div class="nav-item" data-page="products">
            <span class="nav-icon">📦</span>
            <span>Products</span>
          </div>
          <div class="nav-item" data-page="orders">
            <span class="nav-icon">🛒</span>
            <span>Orders</span>
          </div>
          <div class="nav-item" data-page="reviews">
            <span class="nav-icon">⭐</span>
            <span>Reviews</span>
          </div>
          <div class="nav-item" data-page="contacts">
            <span class="nav-icon">📞</span>
            <span>Contacts</span>
          </div>
          <div class="nav-item logout-btn" id="logoutBtn">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
          </div>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-title">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Welcome back, Admin</p>
          </div>
          <div class="admin-user">
            <span id="adminEmail"></span>
            <div class="admin-avatar">A</div>
          </div>
        </header>
        <div class="admin-content" id="adminContent">
          <!-- Dashboard Content -->
          <div class="page-content active" id="dashboardPage">
            <div class="stats-grid" id="statsGrid">
              <div class="stat-card">
                <div class="stat-info">
                  <h3>Total Products</h3>
                  <div class="stat-number" id="totalProducts">0</div>
                </div>
                <div class="stat-icon">📦</div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <h3>Total Orders</h3>
                  <div class="stat-number" id="totalOrders">0</div>
                </div>
                <div class="stat-icon">🛒</div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <h3>Total Revenue</h3>
                  <div class="stat-number" id="totalRevenue">Rs. 0</div>
                </div>
                <div class="stat-icon">💰</div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <h3>Total Reviews</h3>
                  <div class="stat-number" id="totalReviews">0</div>
                </div>
                <div class="stat-icon">⭐</div>
              </div>
            </div>
            <div class="recent-orders">
              <h3>Recent Orders</h3>
              <div class="orders-table" id="recentOrdersTable"></div>
            </div>
          </div>

          <!-- Products Page (loaded dynamically) -->
          <div class="page-content" id="productsPage"></div>

          <!-- Orders Page (loaded dynamically) -->
          <div class="page-content" id="ordersPage"></div>

          <!-- Reviews Page (loaded dynamically) -->
          <div class="page-content" id="reviewsPage"></div>

          <!-- Contacts Page (loaded dynamically) -->
          <div class="page-content" id="contactsPage"></div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/js/admin/dashboard.js"></script>
  </body>
</html>
