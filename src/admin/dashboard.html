<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ColorMart Admin Dashboard">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Admin Dashboard - ColorMart</title>
    
    <link rel="icon" type="image/x-icon" href="../../public/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin/dashboard.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.svg" alt="ColorMart">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="products.html" class="nav-item">
                    <span class="nav-icon">📦</span>
                    <span>Products</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <span class="nav-icon">🛒</span>
                    <span>Orders</span>
                </a>
                <a href="reviews.html" class="nav-item">
                    <span class="nav-icon">⭐</span>
                    <span>Reviews</span>
                </a>
                <a href="contacts.html" class="nav-item">
                    <span class="nav-icon">📧</span>
                    <span>Contacts</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1>Dashboard</h1>
                <div class="admin-user">
                    <span id="admin-email-display">admin@colormart.store</span>
                </div>
            </header>

            <div class="dashboard-content">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📦</div>
                        <div class="stat-info">
                            <h3>Total Products</h3>
                            <p id="total-products">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🛒</div>
                        <div class="stat-info">
                            <h3>Total Orders</h3>
                            <p id="total-orders">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-info">
                            <h3>Total Reviews</h3>
                            <p id="total-reviews">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📧</div>
                        <div class="stat-info">
                            <h3>Messages</h3>
                            <p id="total-contacts">0</p>
                        </div>
                    </div>
                </div>

                <!-- Recent Orders -->
                <div class="dashboard-section">
                    <h2>Recent Orders</h2>
                    <div class="table-container">
                        <table class="admin-table" id="recent-orders-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="recent-orders-body">
                                <!-- Orders will be loaded -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Recent Reviews -->
                <div class="dashboard-section">
                    <h2>Recent Reviews</h2>
                    <div class="reviews-list-mini" id="recent-reviews">
                        <!-- Reviews will be loaded -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/config/env.js"></script>
    <script type="module" src="../js/config/firebase.js"></script>
    <script type="module" src="../js/admin/auth.js"></script>
    <script type="module" src="../js/admin/dashboard.js"></script>
</body>
</html>
