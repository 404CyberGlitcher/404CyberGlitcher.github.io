<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviews Management - ColorMart Admin</title>
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/admin/reviews.css" />
  </head>
  <body>
    <div class="reviews-management">
      <div class="reviews-header">
        <h2>Customer Reviews</h2>
        <div class="reviews-stats" id="reviewsStats"></div>
      </div>

      <div class="review-filters">
        <select class="rating-filter" id="filterRating">
          <option value="all">All Ratings</option>
          <option value="5">5 Stars</option>
          <option value="4">4 Stars</option>
          <option value="3">3 Stars</option>
          <option value="2">2 Stars</option>
          <option value="1">1 Star</option>
        </select>
        <select class="sort-filter" id="sortReviews">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="highest">Highest Rated</option>
          <option value="lowest">Lowest Rated</option>
        </select>
        <select class="status-filter" id="filterReviewStatus">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <div class="reviews-grid" id="reviewsGrid">
        <div class="skeleton-loader" style="height: 150px"></div>
        <div class="skeleton-loader" style="height: 150px"></div>
        <div class="skeleton-loader" style="height: 150px"></div>
      </div>
    </div>

    <script type="module" src="/src/js/admin/reviews.js"></script>
  </body>
</html>
