<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders Management - ColorMart Admin</title>
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/admin/orders.css" />
  </head>
  <body>
    <div class="orders-management">
      <div class="orders-header">
        <h2>Orders Management</h2>
        <div class="orders-stats" id="ordersStats"></div>
      </div>

      <div class="order-filters">
        <select class="status-filter" id="filterStatus">
          <option value="all">All Orders</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <input type="date" class="date-filter" id="filterDate" />
      </div>

      <div class="orders-table-container">
        <table class="orders-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Total</th>
              <th>Status</th>
              <th>Payment</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr>
              <td colspan="6">
                <div class="skeleton-loader" style="height: 300px"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Order Detail Modal -->
    <div class="modal" id="orderDetailModal">
      <div class="modal-content order-detail-content">
        <div class="modal-header">
          <h2>Order Details</h2>
          <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body" id="orderDetailBody"></div>
        <div class="modal-footer">
          <button class="print-btn" id="printOrderBtn">Print Order</button>
          <button class="close-modal-btn cancel-btn">Close</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/admin/orders.js"></script>
  </body>
</html>
