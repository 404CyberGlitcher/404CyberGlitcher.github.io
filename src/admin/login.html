<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ColorMart Admin Panel Login">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Admin Login - ColorMart</title>
    
    <link rel="icon" type="image/x-icon" href="../../public/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin/login.css">
</head>
<body class="admin-body">
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="../../assets/images/logo.svg" alt="ColorMart Logo" class="login-logo">
                <h1>Admin Panel</h1>
                <p>Sign in to manage your store</p>
            </div>
            
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-email">Email Address</label>
                    <input type="email" id="admin-email" required placeholder="admin@colormart.store">
                    <span class="error-message" id="email-error"></span>
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required placeholder="Enter your password">
                    <span class="error-message" id="password-error"></span>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            
            <div class="login-status" id="login-status"></div>
            
            <div class="login-footer">
                <p>© 2024 ColorMart. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script type="module" src="../js/config/env.js"></script>
    <script type="module" src="../js/config/firebase.js"></script>
    <script type="module" src="../js/admin/auth.js"></script>
</body>
</html>
