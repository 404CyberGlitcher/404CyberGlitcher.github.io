<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - ColorMart</title>
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/admin/login.css" />
  </head>
  <body class="admin-login">
    <div class="login-container">
      <div class="login-box">
        <div class="login-logo">
          <h1>ColorMart <span>Admin</span></h1>
          <p>Secure Access Portal</p>
        </div>
        <form id="loginForm" class="login-form">
          <div
            id="errorMessage"
            class="error-message"
            style="display: none"
          ></div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="admin@colormart.store"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="Enter your password"
            />
          </div>
          <button type="submit" class="btn-primary login-btn">
            Login to Dashboard
          </button>
        </form>
        <div class="login-footer">
          <p>Protected area for authorized personnel only</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/js/admin/auth.js"></script>
  </body>
</html>
