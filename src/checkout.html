<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure checkout at ColorMart. Complete your order for beauty and cosmetics products.">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Checkout - ColorMart</title>
    
    <link rel="icon" type="image/x-icon" href="../public/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <div class="announcement-bar">
        <div class="container">
            <p>🎁 Free Gift with every Order | Free Shipping on orders over Rs. 2,500</p>
        </div>
    </div>

    <div id="header-container"></div>

    <main>
        <section class="checkout-section">
            <div class="container">
                <h1>Checkout</h1>
                
                <div class="checkout-layout">
                    <div class="checkout-form-container" data-aos="fade-right">
                        <h2>Shipping Information</h2>
                        <form id="checkout-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="first-name">First Name *</label>
                                    <input type="text" id="first-name" required>
                                </div>
                                <div class="form-group">
                                    <label for="last-name">Last Name *</label>
                                    <input type="text" id="last-name" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input type="email" id="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone *</label>
                                <input type="tel" id="phone" required>
                            </div>
                            <div class="form-group">
                                <label for="address">Address *</label>
                                <input type="text" id="address" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City *</label>
                                    <input type="text" id="city" required>
                                </div>
                                <div class="form-group">
                                    <label for="postal-code">Postal Code</label>
                                    <input type="text" id="postal-code">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="notes">Order Notes (Optional)</label>
                                <textarea id="notes" rows="3"></textarea>
                            </div>
                            <button type="submit" class="place-order-btn">Place Order</button>
                        </form>
                    </div>

                    <div class="order-summary" data-aos="fade-left">
                        <h2>Order Summary</h2>
                        <div class="cart-items" id="checkout-cart-items">
                            <!-- Cart items will be loaded -->
                        </div>
                        <div class="order-totals">
                            <div class="subtotal">
                                <span>Subtotal</span>
                                <span id="subtotal">Rs. 0</span>
                            </div>
                            <div class="shipping">
                                <span>Shipping</span>
                                <span id="shipping-cost">Free</span>
                            </div>
                            <div class="total">
                                <span>Total</span>
                                <span id="total">Rs. 0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="js/config/env.js"></script>
    <script type="module" src="js/config/firebase.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="js/components/header.js"></script>
    <script type="module" src="js/components/footer.js"></script>
    <script type="module" src="js/components/cart.js"></script>
    <script type="module" src="js/utils/emailService.js"></script>
    <script type="module" src="js/checkout.js"></script>
</body>
</html>
