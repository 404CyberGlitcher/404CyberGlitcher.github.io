<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our complete catalog of beauty, cosmetics, hair care, men's care, and organizer products at ColorMart. Find your perfect products with easy filtering and sorting.">
    <meta name="keywords" content="ColorMart catalog, beauty products, cosmetics, makeup, hair care, men's care, organizers, shop online">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="ColorMart Product Catalog - Beauty & Cosmetics">
    <meta property="og:description" content="Browse our complete collection of beauty and cosmetics products at ColorMart.">
    <meta property="og:url" content="https://colormart.store/src/catalog.html">
    <meta property="og:type" content="website">
    
    <link rel="canonical" href="https://colormart.store/src/catalog.html">
    
    <title>Product Catalog - ColorMart Beauty & Cosmetics Store</title>
    
    <link rel="icon" type="image/x-icon" href="../public/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/catalog.css">
</head>
<body>
    <div class="announcement-bar">
        <div class="container">
            <p>🎁 Free Gift with every Order | Free Shipping on orders over Rs. 2,500</p>
        </div>
    </div>

    <div id="header-container"></div>

    <main>
        <section class="catalog-header" data-aos="fade-down">
            <div class="container">
                <h1>Product Catalog</h1>
                <div class="breadcrumb">
                    <a href="../index.html">Home</a> / <span>Catalog</span>
                </div>
            </div>
        </section>

        <section class="catalog-content">
            <div class="container">
                <div class="catalog-layout">
                    <!-- Filters Sidebar -->
                    <aside class="filters-sidebar" data-aos="fade-right">
                        <div class="filter-section">
                            <h3>Filters</h3>
                            
                            <div class="filter-group">
                                <h4>Category</h4>
                                <div class="filter-options" id="category-filters">
                                    <label class="filter-option">
                                        <input type="checkbox" value="makeup">
                                        <span>Makeup</span>
                                    </label>
                                    <label class="filter-option">
                                        <input type="checkbox" value="hair-care">
                                        <span>Hair Care</span>
                                    </label>
                                    <label class="filter-option">
                                        <input type="checkbox" value="mens-care">
                                        <span>Men's Care</span>
                                    </label>
                                    <label class="filter-option">
                                        <input type="checkbox" value="organizers">
                                        <span>Organizers</span>
                                    </label>
                                    <label class="filter-option">
                                        <input type="checkbox" value="essentials">
                                        <span>Essentials</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filter-group">
                                <h4>Brand</h4>
                                <div class="filter-options" id="brand-filters">
                                    <!-- Brands will be loaded dynamically -->
                                </div>
                            </div>

                            <div class="filter-group">
                                <h4>Price Range</h4>
                                <div class="price-range">
                                    <input type="range" min="0" max="10000" value="10000" id="price-range">
                                    <div class="price-inputs">
                                        <span>Rs. 0</span>
                                        <span id="max-price-display">Rs. 10,000</span>
                                    </div>
                                </div>
                            </div>

                            <button class="clear-filters-btn" id="clear-filters">Clear All Filters</button>
                        </div>
                    </aside>

                    <!-- Products Grid -->
                    <div class="products-area">
                        <div class="products-header">
                            <div class="results-count" id="results-count">
                                Showing <span>0</span> products
                            </div>
                            <div class="sort-options">
                                <label for="sort-select">Sort by:</label>
                                <select id="sort-select">
                                    <option value="featured">Featured</option>
                                    <option value="best-selling">Best Selling</option>
                                    <option value="price-low-high">Price: Low to High</option>
                                    <option value="price-high-low">Price: High to Low</option>
                                    <option value="newest">Newest</option>
                                    <option value="alphabetical">Alphabetical</option>
                                </select>
                            </div>
                        </div>

                        <div class="product-grid skeleton-grid" id="catalog-products-grid">
                            <!-- Products will be loaded dynamically -->
                        </div>

                        <div class="pagination" id="pagination">
                            <!-- Pagination will be added dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="js/config/env.js"></script>
    <script type="module" src="js/config/firebase.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="js/components/header.js"></script>
    <script type="module" src="js/components/footer.js"></script>
    <script type="module" src="js/components/cart.js"></script>
    <script type="module" src="js/utils/skeletonLoader.js"></script>
    <script type="module" src="js/catalog.js"></script>
</body>
</html>
